services:
  back:
    image: yangyag2/house-back:latest
    build:
      context: ./back
    container_name: ${CONTAINER_PREFIX}-back
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?currentSchema=${DB_SCHEMA}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: ${DB_SCHEMA}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    expose:
      - "8080"
    networks:
      - house-net
    restart: unless-stopped

  front:
    image: yangyag2/house-front:latest
    build:
      context: ./front
    container_name: ${CONTAINER_PREFIX}-front
    depends_on:
      - back
    ports:
      - "${FRONT_PORT}:80"
    networks:
      - house-net
    restart: unless-stopped

networks:
  house-net:
    name: ${NETWORK_NAME}
    driver: bridge
