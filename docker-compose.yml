services:
  postgres:
    image: postgres:17
    container_name: house-postgres
    environment:
      POSTGRES_DB: house_inventory
      POSTGRES_USER: house
      POSTGRES_PASSWORD: house
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U house -d house_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - house-network

  back:
    build:
      context: ./back
    container_name: house-back
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/house_inventory
      SPRING_DATASOURCE_USERNAME: house
      SPRING_DATASOURCE_PASSWORD: house
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8085,http://43.202.113.123:8085,http://yangyag2.duckdns.org,https://yangyag2.duckdns.org
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - house-network

  front:
    build:
      context: ./front
    container_name: house-front
    depends_on:
      - back
    ports:
      - "8085:80"
    networks:
      - house-network

volumes:
  postgres-data:

networks:
  house-network:
    driver: bridge
